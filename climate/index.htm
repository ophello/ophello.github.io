<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climate Data Explorer — NOAA CDO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1b1e2a;
    --paper: #f3f0e8;
    --warm: #faf8f3;
    --rule: #d2cdc3;
    --muted: #807a6e;
    --accent: #c45d3e;
    --high: #c45d3e;
    --low: #3e7fa8;
    --select-bg: #fff;
    --font-display: 'Fraunces', Georgia, serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
    --radius: 6px;
  }

  body {
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 14px;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  header {
    margin-bottom: 48px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 24px;
  }

  header h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 2.4rem;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }

  header p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.02em;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 40px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 180px;
  }

  .field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 500;
  }

  .field select {
    appearance: none;
    background: var(--select-bg) url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23807a6e'/%3E%3C/svg%3E") no-repeat right 12px center;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 10px 36px 10px 14px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.2s;
    width: 100%;
  }

  .field select:hover { border-color: var(--muted); }
  .field select:focus { outline: none; border-color: var(--accent); }
  .field select:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-generate {
    align-self: flex-end;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: var(--radius);
    padding: 10px 28px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-generate:hover { background: #2d3147; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .status {
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
  }

  .status.error { color: var(--accent); }

  .progress-bar {
    height: 3px;
    background: var(--rule);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
    display: none;
  }

  .progress-bar.active { display: block; }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .station-info {
    background: var(--warm);
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 32px;
    display: none;
  }

  .station-info.visible { display: block; }

  .station-info h2 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.3rem;
    margin-bottom: 4px;
  }

  .station-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 4px;
  }

  .station-meta span::before {
    content: '·';
    margin-right: 6px;
    color: var(--rule);
  }

  .station-meta span:first-child::before { display: none; }

  .chart-wrap {
    background: #fff;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 28px 24px 20px;
    display: none;
  }

  .chart-wrap.visible { display: block; }

  .chart-wrap canvas { width: 100% !important; }

  .chart-legend {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-bottom: 16px;
    font-size: 12px;
    letter-spacing: 0.03em;
  }

  .chart-legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 10px;
    height: 3px;
    border-radius: 2px;
  }

  .legend-dot.high { background: var(--high); }
  .legend-dot.low { background: var(--low); }
  .legend-dot.trend { background: var(--ink); border-style: dashed; }

  footer {
    margin-top: 56px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  @media (max-width: 640px) {
    .container { padding: 28px 16px 60px; }
    header h1 { font-size: 1.6rem; }
    .controls { flex-direction: column; }
    .field { min-width: 100%; }
    .btn-generate { width: 100%; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .loading { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Climate Data Explorer</h1>
    <p>Monthly average temperatures from NOAA's Climate Data Online — 1980 to present</p>
  </header>

  <div class="controls">
    <div class="field">
      <label for="sel-state">State</label>
      <select id="sel-state"><option value="">Select a state…</option></select>
    </div>
    <div class="field">
      <label for="sel-city">City</label>
      <select id="sel-city" disabled><option value="">Select a city…</option></select>
    </div>
    <div class="field">
      <label for="sel-station">Station</label>
      <select id="sel-station" disabled><option value="">Select a station…</option></select>
    </div>
    <button class="btn-generate" id="btn-gen" disabled>Generate Data</button>
  </div>

  <div class="status" id="status"></div>
  <div class="progress-bar" id="progress"><div class="progress-bar-fill" id="progress-fill"></div></div>

  <div class="station-info" id="station-info">
    <h2 id="info-name"></h2>
    <div class="station-meta">
      <span id="info-id"></span>
      <span id="info-elev"></span>
      <span id="info-range"></span>
    </div>
  </div>

  <div class="chart-wrap" id="chart-wrap">
    <div class="chart-legend">
      <span><span class="legend-dot high"></span>Monthly Avg Temperature (°C)</span>
      <span><span class="legend-dot trend"></span>Linear Trend</span>
    </div>
    <div id="trend-info" style="display:none; text-align:center; font-size:13px; margin-bottom:12px; color:var(--ink); font-weight:500;"></div>
    <canvas id="tempChart"></canvas>
  </div>

  <footer>
    Version 1.2 — Data source: NOAA National Centers for Environmental Information, Climate Data Online (CDO) API v2
  </footer>

</div>

<script>
(function() {
  // ━━━ CONFIG ━━━
  var API_TOKEN  = "ENxLSyBnXKBfPBnzNlkomSAMEDgLbwYF";
  var NOAA_BASE  = "https://www.ncei.noaa.gov/cdo-web/api/v2";
  var CORS_PROXY = "https://corsproxy.io/?";
  var DATASET    = "GSOM";
  var DATA_TYPES = "TAVG,TMAX";
  var START_YEAR = 1980;

  // ━━━ DOM ━━━
  var selState   = document.getElementById("sel-state");
  var selCity    = document.getElementById("sel-city");
  var selStation = document.getElementById("sel-station");
  var btnGen     = document.getElementById("btn-gen");
  var elStatus   = document.getElementById("status");
  var elProgress = document.getElementById("progress");
  var elFill     = document.getElementById("progress-fill");
  var elInfo     = document.getElementById("station-info");
  var elChart    = document.getElementById("chart-wrap");

  var chart = null;

  // ━━━ API HELPER ━━━
  async function cdoFetch(endpoint, params) {
    params = params || {};
    var noaaUrl = new URL(NOAA_BASE + endpoint);
    Object.keys(params).forEach(function(k) {
      var v = params[k];
      if (v !== undefined && v !== null && v !== "") noaaUrl.searchParams.set(k, String(v));
    });
    var proxyUrl = CORS_PROXY + encodeURIComponent(noaaUrl.toString());
    var res = await fetch(proxyUrl, {
      headers: { token: API_TOKEN }
    });
    if (!res.ok) {
      var txt = await res.text().catch(function() { return ""; });
      throw new Error("API error " + res.status + ": " + (txt || res.statusText));
    }
    return res.json();
  }

  // ━━━ STATUS HELPERS ━━━
  function setStatus(msg, isError) {
    elStatus.textContent = msg;
    elStatus.className = "status" + (isError ? " error" : "");
  }

  function showProgress(pct) {
    elProgress.classList.add("active");
    elFill.style.width = pct + "%";
  }

  function hideProgress() {
    elProgress.classList.remove("active");
    elFill.style.width = "0%";
  }

  // ━━━ US STATES (FIPS codes) ━━━
  var US_STATES = [
    ["AL","Alabama","FIPS:01"],["AK","Alaska","FIPS:02"],["AZ","Arizona","FIPS:04"],
    ["AR","Arkansas","FIPS:05"],["CA","California","FIPS:06"],["CO","Colorado","FIPS:08"],
    ["CT","Connecticut","FIPS:09"],["DE","Delaware","FIPS:10"],["FL","Florida","FIPS:12"],
    ["GA","Georgia","FIPS:13"],["HI","Hawaii","FIPS:15"],["ID","Idaho","FIPS:16"],
    ["IL","Illinois","FIPS:17"],["IN","Indiana","FIPS:18"],["IA","Iowa","FIPS:19"],
    ["KS","Kansas","FIPS:20"],["KY","Kentucky","FIPS:21"],["LA","Louisiana","FIPS:22"],
    ["ME","Maine","FIPS:23"],["MD","Maryland","FIPS:24"],["MA","Massachusetts","FIPS:25"],
    ["MI","Michigan","FIPS:26"],["MN","Minnesota","FIPS:27"],["MS","Mississippi","FIPS:28"],
    ["MO","Missouri","FIPS:29"],["MT","Montana","FIPS:30"],["NE","Nebraska","FIPS:31"],
    ["NV","Nevada","FIPS:32"],["NH","New Hampshire","FIPS:33"],["NJ","New Jersey","FIPS:34"],
    ["NM","New Mexico","FIPS:35"],["NY","New York","FIPS:36"],["NC","North Carolina","FIPS:37"],
    ["ND","North Dakota","FIPS:38"],["OH","Ohio","FIPS:39"],["OK","Oklahoma","FIPS:40"],
    ["OR","Oregon","FIPS:41"],["PA","Pennsylvania","FIPS:42"],["RI","Rhode Island","FIPS:44"],
    ["SC","South Carolina","FIPS:45"],["SD","South Dakota","FIPS:46"],["TN","Tennessee","FIPS:47"],
    ["TX","Texas","FIPS:48"],["UT","Utah","FIPS:49"],["VT","Vermont","FIPS:50"],
    ["VA","Virginia","FIPS:51"],["WA","Washington","FIPS:53"],["WV","West Virginia","FIPS:54"],
    ["WI","Wisconsin","FIPS:55"],["WY","Wyoming","FIPS:56"],
    ["DC","District of Columbia","FIPS:11"],["PR","Puerto Rico","FIPS:72"],
    ["VI","US Virgin Islands","FIPS:78"]
  ];

  US_STATES.forEach(function(s) {
    var opt = document.createElement("option");
    opt.value = s[2];
    opt.textContent = s[1] + " (" + s[0] + ")";
    selState.appendChild(opt);
  });

  // ━━━ STATE → LOAD CITIES via /locations API ━━━
  selState.addEventListener("change", async function() {
    selCity.innerHTML = '<option value="">Loading cities…</option>';
    selCity.disabled = true;
    selStation.innerHTML = '<option value="">Select a station…</option>';
    selStation.disabled = true;
    btnGen.disabled = true;
    elInfo.classList.remove("visible");
    elChart.classList.remove("visible");

    var fips = this.value;
    if (!fips) {
      selCity.innerHTML = '<option value="">Select a city…</option>';
      return;
    }

    setStatus("Loading cities for this state…");

    try {
      var allCities = [];
      var offset = 1;
      var limit = 1000;

      while (true) {
        var data = await cdoFetch("/locations", {
          locationcategoryid: "CITY",
          datasetid: DATASET,
          locationid: fips,
          sortfield: "name",
          limit: limit,
          offset: offset
        });

        if (data.results && data.results.length > 0) {
          allCities = allCities.concat(data.results);
          var total = data.metadata && data.metadata.resultset ? data.metadata.resultset.count : 0;
          if (allCities.length >= total) break;
          offset += limit;
        } else {
          break;
        }
      }

      if (allCities.length === 0) {
        setStatus("No cities with monthly temperature data found.", true);
        selCity.innerHTML = '<option value="">No cities found</option>';
        return;
      }

      // Filter to only cities that belong to this state
      // CDO city IDs follow the pattern CITY:USXXNNNN where XX is the state FIPS number
      var stateCode = fips.replace("FIPS:", "");
      allCities = allCities.filter(function(c) {
        return c.id && c.id.indexOf("CITY:US" + stateCode) === 0;
      });

      if (allCities.length === 0) {
        setStatus("No cities found for this state.", true);
        selCity.innerHTML = '<option value="">No cities found</option>';
        return;
      }

      selCity.innerHTML = '<option value="">Select a city… (' + allCities.length + ' found)</option>';
      allCities.forEach(function(c) {
        var opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name.replace(/,\s*[A-Z]{2}\s+US\s*$/, "").trim();
        selCity.appendChild(opt);
      });

      selCity.disabled = false;
      setStatus(allCities.length + " cities found.");
    } catch (err) {
      setStatus("Error loading cities: " + err.message, true);
      selCity.innerHTML = '<option value="">Error</option>';
    }
  });

  // ━━━ CITY → LOAD STATIONS via /stations API ━━━
  selCity.addEventListener("change", async function() {
    selStation.innerHTML = '<option value="">Loading stations…</option>';
    selStation.disabled = true;
    btnGen.disabled = true;
    elInfo.classList.remove("visible");
    elChart.classList.remove("visible");

    var cityId = this.value;
    if (!cityId) {
      selStation.innerHTML = '<option value="">Select a station…</option>';
      return;
    }

    setStatus("Loading stations for this city…");

    try {
      var allStations = [];
      var offset = 1;
      var limit = 1000;

      while (true) {
        var data = await cdoFetch("/stations", {
          datasetid: DATASET,
          locationid: cityId,
          datatypeid: "TMAX",
          sortfield: "name",
          limit: limit,
          offset: offset
        });

        if (data.results && data.results.length > 0) {
          allStations = allStations.concat(data.results);
          var total = data.metadata && data.metadata.resultset ? data.metadata.resultset.count : 0;
          if (allStations.length >= total) break;
          offset += limit;
        } else {
          break;
        }
      }

      if (allStations.length === 0) {
        setStatus("No stations found in this city.", true);
        selStation.innerHTML = '<option value="">No stations found</option>';
        return;
      }

      // Only show stations with data going back to 1980 or earlier
      allStations = allStations.filter(function(s) {
        return s.mindate && s.mindate.slice(0, 4) <= "1980";
      });

      if (allStations.length === 0) {
        setStatus("No stations with data back to 1980 found in this city.", true);
        selStation.innerHTML = '<option value="">No qualifying stations</option>';
        return;
      }

      selStation.innerHTML = '<option value="">Select a station… (' + allStations.length + ' found)</option>';
      allStations.forEach(function(s) {
        var opt = document.createElement("option");
        opt.value = JSON.stringify(s);
        var dates = (s.mindate || "").slice(0, 4) + "–" + (s.maxdate || "").slice(0, 4);
        opt.textContent = s.name + " [" + dates + "]";
        selStation.appendChild(opt);
      });

      selStation.disabled = false;
      setStatus(allStations.length + " station" + (allStations.length > 1 ? "s" : "") + " found.");
    } catch (err) {
      setStatus("Error loading stations: " + err.message, true);
      selStation.innerHTML = '<option value="">Error</option>';
    }
  });

  // ━━━ STATION → ENABLE BUTTON ━━━
  selStation.addEventListener("change", function() {
    btnGen.disabled = !this.value;
    elInfo.classList.remove("visible");
    elChart.classList.remove("visible");
  });

  // ━━━ GENERATE DATA ━━━
  btnGen.addEventListener("click", async function() {
    var stationJson = selStation.value;
    if (!stationJson) return;

    var station = JSON.parse(stationJson);
    btnGen.disabled = true;
    selState.disabled = true;
    selCity.disabled = true;
    selStation.disabled = true;

    document.getElementById("info-name").textContent = station.name;
    document.getElementById("info-id").textContent = station.id;
    document.getElementById("info-elev").textContent = station.elevation != null
      ? "Elev. " + station.elevation + " m" : "";
    document.getElementById("info-range").textContent = "Records: " + (station.mindate || "?") + " → " + (station.maxdate || "?");
    elInfo.classList.add("visible");

    try {
      setStatus("Fetching monthly temperature data…");
      showProgress(0);

      // Fetch TAVG (and TMAX as fallback) for all months
      // GSOM data endpoint: max 10-year range per request
      var currentYear = new Date().getFullYear();
      var chunks = [];
      for (var y = START_YEAR; y <= currentYear; y += 10) {
        var endY = Math.min(y + 9, currentYear);
        chunks.push({
          startdate: y + "-01-01",
          enddate: endY + "-12-31"
        });
      }

      var allResults = [];
      var apiCalls = 0;

      for (var i = 0; i < chunks.length; i++) {
        var chunk = chunks[i];
        var pct = Math.round((i / chunks.length) * 100);
        showProgress(pct);
        setStatus("Fetching " + chunk.startdate.slice(0, 4) + "–" + chunk.enddate.slice(0, 4) +
          "… (chunk " + (i + 1) + "/" + chunks.length + ")");

        var offset = 1;
        var limit = 1000;
        var chunkTotal = null;

        while (true) {
          var data = await cdoFetch("/data", {
            datasetid: DATASET,
            stationid: station.id,
            datatypeid: DATA_TYPES,
            startdate: chunk.startdate,
            enddate: chunk.enddate,
            units: "metric",
            limit: limit,
            offset: offset
          });
          apiCalls++;

          if (data.results && data.results.length > 0) {
            allResults = allResults.concat(data.results);
            if (chunkTotal === null && data.metadata && data.metadata.resultset) {
              chunkTotal = data.metadata.resultset.count;
            }
            var fetched = offset - 1 + data.results.length;
            if (chunkTotal && fetched >= chunkTotal) break;
            if (data.results.length < limit) break;
            offset += limit;
          } else {
            break;
          }
        }
      }

      showProgress(100);

      if (allResults.length === 0) {
        setStatus("No temperature data found for this station.", true);
        hideProgress();
        enableControls();
        return;
      }

      // Build a map keyed by date (YYYY-MM), preferring TAVG over TMAX
      var tempByMonth = {};
      var usedTavg = 0;
      var usedTmax = 0;

      allResults.forEach(function(r) {
        var dateKey = r.date.slice(0, 7); // YYYY-MM
        if (r.datatype === "TAVG") {
          tempByMonth[dateKey] = { x: r.date.slice(0, 10), y: r.value, type: "TAVG" };
        } else if (r.datatype === "TMAX") {
          // Only use TMAX if we don't already have TAVG for this month
          if (!tempByMonth[dateKey] || tempByMonth[dateKey].type !== "TAVG") {
            tempByMonth[dateKey] = { x: r.date.slice(0, 10), y: r.value, type: "TMAX" };
          }
        }
      });

      // Sort by date and build final array
      var sortedKeys = Object.keys(tempByMonth).sort();
      var temps = sortedKeys.map(function(k) {
        var entry = tempByMonth[k];
        if (entry.type === "TAVG") usedTavg++;
        else usedTmax++;
        return { x: entry.x, y: entry.y };
      });

      var sourceNote = "";
      if (usedTmax === 0) {
        sourceNote = "Using TAVG for all months.";
      } else if (usedTavg === 0) {
        sourceNote = "TAVG unavailable — using TMAX as fallback.";
      } else {
        sourceNote = "TAVG for " + usedTavg + " months, TMAX fallback for " + usedTmax + ".";
      }

      setStatus(
        temps.length + " monthly temperatures loaded. " + sourceNote +
        " (" + apiCalls + " API calls)"
      );
      hideProgress();

      renderChart(temps, station.name);

    } catch (err) {
      setStatus("Error fetching data: " + err.message, true);
      hideProgress();
    }

    enableControls();
  });

  function enableControls() {
    selState.disabled = false;
    selCity.disabled = false;
    selStation.disabled = false;
    btnGen.disabled = false;
  }

  // ━━━ LINEAR REGRESSION (least squares) ━━━
  function linearRegression(data) {
    // data = array of {x: "YYYY-MM-DD", y: number}
    // Convert dates to numeric (days since first date) for regression
    var firstTime = new Date(data[0].x).getTime();
    var n = data.length;
    var sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;

    var points = data.map(function(d) {
      var xNum = (new Date(d.x).getTime() - firstTime) / (1000 * 60 * 60 * 24); // days
      return { xNum: xNum, y: d.y, xDate: d.x };
    });

    points.forEach(function(p) {
      sumX += p.xNum;
      sumY += p.y;
      sumXY += p.xNum * p.y;
      sumX2 += p.xNum * p.xNum;
      sumY2 += p.y * p.y;
    });

    var slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
    var intercept = (sumY - slope * sumX) / n;

    // R² (coefficient of determination)
    var yMean = sumY / n;
    var ssRes = 0, ssTot = 0;
    points.forEach(function(p) {
      var predicted = slope * p.xNum + intercept;
      ssRes += (p.y - predicted) * (p.y - predicted);
      ssTot += (p.y - yMean) * (p.y - yMean);
    });
    var r2 = ssTot === 0 ? 0 : 1 - (ssRes / ssTot);

    // Slope per decade (days → decades: 3652.5 days per decade)
    var slopePerDecade = slope * 3652.5;

    // Generate trendline points (just start and end)
    var trendData = [
      { x: points[0].xDate, y: slope * points[0].xNum + intercept },
      { x: points[n - 1].xDate, y: slope * points[n - 1].xNum + intercept }
    ];

    return {
      trendData: trendData,
      slopePerDecade: slopePerDecade,
      r2: r2
    };
  }

  // ━━━ CHART ━━━
  function renderChart(temps, stationName) {
    elChart.classList.add("visible");
    if (chart) chart.destroy();

    // Compute trendline
    var reg = linearRegression(temps);
    var trendLabel = "Trend: " +
      (reg.slopePerDecade >= 0 ? "+" : "") +
      reg.slopePerDecade.toFixed(2) + " °C/decade (R² = " +
      reg.r2.toFixed(3) + ")";

    // Update trend info display
    var trendEl = document.getElementById("trend-info");
    if (trendEl) {
      trendEl.textContent = trendLabel;
      trendEl.style.display = "block";
    }

    var ctx = document.getElementById("tempChart").getContext("2d");

    chart = new Chart(ctx, {
      type: "line",
      data: {
        datasets: [
          {
            label: "Avg Temperature (°C)",
            data: temps,
            borderColor: getComputedStyle(document.documentElement).getPropertyValue("--high").trim(),
            backgroundColor: "rgba(196, 93, 62, 0.08)",
            borderWidth: 1.5,
            pointRadius: 0,
            pointHitRadius: 6,
            fill: true,
            tension: 0.3,
            order: 2
          },
          {
            label: trendLabel,
            data: reg.trendData,
            borderColor: "#1b1e2a",
            borderWidth: 2,
            borderDash: [8, 4],
            pointRadius: 0,
            pointHitRadius: 0,
            fill: false,
            tension: 0,
            order: 1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: 2.5,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#1b1e2a",
            titleFont: { family: "'DM Mono', monospace", size: 12 },
            bodyFont: { family: "'DM Mono', monospace", size: 12 },
            padding: 12,
            cornerRadius: 4,
            filter: function(tooltipItem) {
              return tooltipItem.datasetIndex === 0;
            },
            callbacks: {
              title: function(items) {
                return items[0] && items[0].raw ? items[0].raw.x : "";
              },
              label: function(ctx) {
                return "Temp: " + ctx.raw.y.toFixed(1) + " °C";
              }
            }
          }
        },
        scales: {
          x: {
            type: "time",
            time: {
              unit: "year",
              displayFormats: { year: "yyyy" },
              tooltipFormat: "MMM yyyy"
            },
            grid: { color: "rgba(0,0,0,0.04)", drawTicks: false },
            ticks: {
              font: { family: "'DM Mono', monospace", size: 11 },
              color: "#807a6e",
              padding: 8
            },
            border: { color: "#d2cdc3" }
          },
          y: {
            title: {
              display: true,
              text: "Temperature (°C)",
              font: { family: "'DM Mono', monospace", size: 11, weight: 400 },
              color: "#807a6e"
            },
            grid: { color: "rgba(0,0,0,0.04)", drawTicks: false },
            ticks: {
              font: { family: "'DM Mono', monospace", size: 11 },
              color: "#807a6e",
              padding: 8,
              callback: function(val) { return val + "°"; }
            },
            border: { color: "#d2cdc3" }
          }
        }
      }
    });

    elChart.scrollIntoView({ behavior: "smooth", block: "center" });
  }

})();
