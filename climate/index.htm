<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climate Data Explorer — NOAA CDO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1b1e2a;
    --paper: #f3f0e8;
    --warm: #faf8f3;
    --rule: #d2cdc3;
    --muted: #807a6e;
    --accent: #c45d3e;
    --high: #c45d3e;
    --low: #3e7fa8;
    --select-bg: #fff;
    --font-display: 'Fraunces', Georgia, serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
    --radius: 6px;
  }

  body {
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 14px;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  header {
    margin-bottom: 48px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 24px;
  }

  header h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 2.4rem;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }

  header p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.02em;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 40px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 180px;
  }

  .field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 500;
  }

  .field select {
    appearance: none;
    background: var(--select-bg) url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23807a6e'/%3E%3C/svg%3E") no-repeat right 12px center;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 10px 36px 10px 14px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.2s;
    width: 100%;
  }

  .field select:hover { border-color: var(--muted); }
  .field select:focus { outline: none; border-color: var(--accent); }
  .field select:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-generate {
    align-self: flex-end;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: var(--radius);
    padding: 10px 28px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-generate:hover { background: #2d3147; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .status {
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
  }

  .status.error { color: var(--accent); }

  .progress-bar {
    height: 3px;
    background: var(--rule);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
    display: none;
  }

  .progress-bar.active { display: block; }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .station-info {
    padding-bottom: 12px;
    display: none;
  }

  .station-info.visible { display: block; }

  .station-info h2 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.1rem;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .station-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 4px;
  }

  .station-meta span::before { display: none; }

  .chart-wrap {
    background: #fff;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    padding: 24px;
    display: none;
  }

  .chart-wrap.visible { display: block; }

  .chart-layout {
    display: flex;
    gap: 24px;
  }

  .chart-sidebar {
    flex: 0 0 240px;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .chart-main {
    flex: 1;
    min-width: 0;
    position: relative;
  }

  .chart-main canvas { width: 100% !important; }

  .chart-legend {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
    font-size: 12px;
    letter-spacing: 0.03em;
  }

  .chart-legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 10px;
    height: 3px;
    border-radius: 2px;
  }

  .legend-dot.high { background: var(--high); }
  .legend-dot.low { background: var(--low); }
  .legend-dot.trend { background: var(--ink); border-style: dashed; }

  footer {
    margin-top: 56px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  @media (max-width: 640px) {
    .container { padding: 28px 16px 60px; }
    header h1 { font-size: 1.6rem; }
    .controls { flex-direction: column; }
    .field { min-width: 100%; }
    .btn-generate { width: 100%; }
    .chart-layout { flex-direction: column; }
    .chart-sidebar { flex: none; min-width: 100%; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .loading { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Climate Data Explorer</h1>
    <p>Monthly average temperatures from NOAA's Climate Data Online — 1970 to present</p>
  </header>

  <div class="controls">
    <div class="field">
      <label for="sel-state">State</label>
      <select id="sel-state"><option value="">Select a state…</option></select>
    </div>
    <div class="field">
      <label for="sel-city">City</label>
      <select id="sel-city" disabled><option value="">Select a city…</option></select>
    </div>
    <div class="field">
      <label for="sel-station">Station</label>
      <select id="sel-station" disabled><option value="">Select a station…</option></select>
    </div>
    <button class="btn-generate" id="btn-gen" disabled>Generate Data</button>
  </div>

  <div class="status" id="status"></div>
  <div class="progress-bar" id="progress"><div class="progress-bar-fill" id="progress-fill"></div></div>

  <div class="chart-wrap" id="chart-wrap">
    <div class="chart-layout">
      <div class="chart-sidebar">
        <div class="station-info" id="station-info">
          <h2 id="info-name"></h2>
          <div class="station-meta">
            <span id="info-id"></span>
            <span id="info-elev"></span>
            <span id="info-range"></span>
          </div>
          <div style="font-size:11px; color:var(--muted); margin-top:8px;">Data source: NOAA National Centers for Environmental Information, Climate Data Online (CDO) API v2</div>
        </div>
        <div class="chart-legend">
          <span><span class="legend-dot high"></span>Monthly Avg Temperature (°C)</span>
          <span><span class="legend-dot trend"></span>Linear Trend</span>
        </div>
        <div id="trend-info" style="display:none; font-size:13px; margin-top:12px; color:var(--ink); font-weight:500;"></div>
      </div>
      <div class="chart-main">
        <canvas id="tempChart"></canvas>
      </div>
    </div>
  </div>

  <footer>
    v2.0
  </footer>

</div>

<script>
(function() {
  // ━━━ CONFIG ━━━
  var API_TOKEN  = "ENxLSyBnXKBfPBnzNlkomSAMEDgLbwYF";
  var NOAA_BASE  = "https://www.ncei.noaa.gov/cdo-web/api/v2";
  var CORS_PROXY = "https://corsproxy.io/?";
  var DATASET    = "GSOM";
  var DATA_TYPES = "TAVG,TMAX";
  var START_YEAR = 1970;

  // ━━━ DOM ━━━
  var selState   = document.getElementById("sel-state");
  var selCity    = document.getElementById("sel-city");
  var selStation = document.getElementById("sel-station");
  var btnGen     = document.getElementById("btn-gen");
  var elStatus   = document.getElementById("status");
  var elProgress = document.getElementById("progress");
  var elFill     = document.getElementById("progress-fill");
  var elInfo     = document.getElementById("station-info");
  var elChart    = document.getElementById("chart-wrap");

  var chart = null;

  // ━━━ API HELPER ━━━
  async function cdoFetch(endpoint, params) {
    params = params || {};
    var noaaUrl = new URL(NOAA_BASE + endpoint);
    Object.keys(params).forEach(function(k) {
      var v = params[k];
      if (v !== undefined && v !== null && v !== "") noaaUrl.searchParams.set(k, String(v));
    });
    var proxyUrl = CORS_PROXY + encodeURIComponent(noaaUrl.toString());
    var res = await fetch(proxyUrl, {
      headers: { token: API_TOKEN }
    });
    if (!res.ok) {
      var txt = await res.text().catch(function() { return ""; });
      throw new Error("API error " + res.status + ": " + (txt || res.statusText));
    }
    return res.json();
  }

  // ━━━ STATUS HELPERS ━━━
  function setStatus(msg, isError) {
    elStatus.textContent = msg;
    elStatus.className = "status" + (isError ? " error" : "");
  }

  function showProgress(pct) {
    elProgress.classList.add("active");
    elFill.style.width = pct + "%";
  }

  function hideProgress() {
    elProgress.classList.remove("active");
    elFill.style.width = "0%";
  }

  // ━━━ US STATES (FIPS codes) ━━━
  var US_STATES = [
    ["AL","Alabama","FIPS:01"],["AK","Alaska","FIPS:02"],["AZ","Arizona","FIPS:04"],
    ["AR","Arkansas","FIPS:05"],["CA","California","FIPS:06"],["CO","Colorado","FIPS:08"],
    ["CT","Connecticut","FIPS:09"],["DE","Delaware","FIPS:10"],["FL","Florida","FIPS:12"],
    ["GA","Georgia","FIPS:13"],["HI","Hawaii","FIPS:15"],["ID","Idaho","FIPS:16"],
    ["IL","Illinois","FIPS:17"],["IN","Indiana","FIPS:18"],["IA","Iowa","FIPS:19"],
    ["KS","Kansas","FIPS:20"],["KY","Kentucky","FIPS:21"],["LA","Louisiana","FIPS:22"],
    ["ME","Maine","FIPS:23"],["MD","Maryland","FIPS:24"],["MA","Massachusetts","FIPS:25"],
    ["MI","Michigan","FIPS:26"],["MN","Minnesota","FIPS:27"],["MS","Mississippi","FIPS:28"],
    ["MO","Missouri","FIPS:29"],["MT","Montana","FIPS:30"],["NE","Nebraska","FIPS:31"],
    ["NV","Nevada","FIPS:32"],["NH","New Hampshire","FIPS:33"],["NJ","New Jersey","FIPS:34"],
    ["NM","New Mexico","FIPS:35"],["NY","New York","FIPS:36"],["NC","North Carolina","FIPS:37"],
    ["ND","North Dakota","FIPS:38"],["OH","Ohio","FIPS:39"],["OK","Oklahoma","FIPS:40"],
    ["OR","Oregon","FIPS:41"],["PA","Pennsylvania","FIPS:42"],["RI","Rhode Island","FIPS:44"],
    ["SC","South Carolina","FIPS:45"],["SD","South Dakota","FIPS:46"],["TN","Tennessee","FIPS:47"],
    ["TX","Texas","FIPS:48"],["UT","Utah","FIPS:49"],["VT","Vermont","FIPS:50"],
    ["VA","Virginia","FIPS:51"],["WA","Washington","FIPS:53"],["WV","West Virginia","FIPS:54"],
    ["WI","Wisconsin","FIPS:55"],["WY","Wyoming","FIPS:56"],
    ["DC","District of Columbia","FIPS:11"],["PR","Puerto Rico","FIPS:72"],
    ["VI","US Virgin Islands","FIPS:78"]
  ];

  US_STATES.forEach(function(s) {
    var opt = document.createElement("option");
    opt.value = s[2];
    opt.textContent = s[1] + " (" + s[0] + ")";
    selState.appendChild(opt);
  });

  // ━━━ TOP 3 CITIES PER STATE BY POPULATION ━━━
  // Used to sort city dropdowns — matched case-insensitively against parsed city names
  // Key: FIPS code, Value: [1st, 2nd, 3rd] largest cities
  var TOP_CITIES = {
    "FIPS:01": ["Birmingham", "Montgomery", "Huntsville"],
    "FIPS:02": ["Anchorage", "Fairbanks", "Juneau"],
    "FIPS:04": ["Phoenix", "Tucson", "Mesa"],
    "FIPS:05": ["Little Rock", "Fort Smith", "Fayetteville"],
    "FIPS:06": ["Los Angeles", "San Diego", "San Jose"],
    "FIPS:08": ["Denver", "Colorado Springs", "Aurora"],
    "FIPS:09": ["Bridgeport", "New Haven", "Hartford"],
    "FIPS:10": ["Wilmington", "Dover", "Newark"],
    "FIPS:11": ["Washington"],
    "FIPS:12": ["Jacksonville", "Miami", "Tampa"],
    "FIPS:13": ["Atlanta", "Augusta", "Columbus"],
    "FIPS:15": ["Honolulu", "Hilo", "Kailua"],
    "FIPS:16": ["Boise", "Meridian", "Nampa"],
    "FIPS:17": ["Chicago", "Aurora", "Joliet"],
    "FIPS:18": ["Indianapolis", "Fort Wayne", "Evansville"],
    "FIPS:19": ["Des Moines", "Cedar Rapids", "Davenport"],
    "FIPS:20": ["Wichita", "Overland Park", "Kansas City"],
    "FIPS:21": ["Louisville", "Lexington", "Bowling Green"],
    "FIPS:22": ["New Orleans", "Baton Rouge", "Shreveport"],
    "FIPS:23": ["Portland", "Lewiston", "Bangor"],
    "FIPS:24": ["Baltimore", "Columbia", "Germantown"],
    "FIPS:25": ["Boston", "Worcester", "Springfield"],
    "FIPS:26": ["Detroit", "Grand Rapids", "Warren"],
    "FIPS:27": ["Minneapolis", "Saint Paul", "Rochester"],
    "FIPS:28": ["Jackson", "Gulfport", "Southaven"],
    "FIPS:29": ["Kansas City", "Saint Louis", "Springfield"],
    "FIPS:30": ["Billings", "Missoula", "Great Falls"],
    "FIPS:31": ["Omaha", "Lincoln", "Bellevue"],
    "FIPS:32": ["Las Vegas", "Henderson", "Reno"],
    "FIPS:33": ["Manchester", "Nashua", "Concord"],
    "FIPS:34": ["Newark", "Jersey City", "Paterson"],
    "FIPS:35": ["Albuquerque", "Las Cruces", "Rio Rancho"],
    "FIPS:36": ["New York", "Buffalo", "Rochester"],
    "FIPS:37": ["Charlotte", "Raleigh", "Greensboro"],
    "FIPS:38": ["Fargo", "Bismarck", "Grand Forks"],
    "FIPS:39": ["Columbus", "Cleveland", "Cincinnati"],
    "FIPS:40": ["Oklahoma City", "Tulsa", "Norman"],
    "FIPS:41": ["Portland", "Salem", "Eugene"],
    "FIPS:42": ["Philadelphia", "Pittsburgh", "Allentown"],
    "FIPS:44": ["Providence", "Warwick", "Cranston"],
    "FIPS:45": ["Charleston", "Columbia", "North Charleston"],
    "FIPS:46": ["Sioux Falls", "Rapid City", "Aberdeen"],
    "FIPS:47": ["Nashville", "Memphis", "Knoxville"],
    "FIPS:48": ["Houston", "San Antonio", "Dallas"],
    "FIPS:49": ["Salt Lake City", "West Valley City", "Provo"],
    "FIPS:50": ["Burlington", "South Burlington", "Rutland"],
    "FIPS:51": ["Virginia Beach", "Norfolk", "Chesapeake"],
    "FIPS:53": ["Seattle", "Spokane", "Tacoma"],
    "FIPS:54": ["Charleston", "Huntington", "Morgantown"],
    "FIPS:55": ["Milwaukee", "Madison", "Green Bay"],
    "FIPS:56": ["Cheyenne", "Casper", "Laramie"],
    "FIPS:72": ["San Juan", "Bayamon", "Carolina"],
    "FIPS:78": ["Charlotte Amalie", "Christiansted", "Frederiksted"]
  };
  var currentFips = "";

  // ━━━ STATE → LOAD ALL STATIONS, GROUP BY CITY ━━━
  var stationsCache = {};

  selState.addEventListener("change", async function() {
    selCity.innerHTML = '<option value="">Loading stations…</option>';
    selCity.disabled = true;
    selStation.innerHTML = '<option value="">Select a station…</option>';
    selStation.disabled = true;
    btnGen.disabled = true;
    elInfo.classList.remove("visible");
    elChart.classList.remove("visible");
    stationsCache = {};

    var fips = this.value;
    currentFips = fips;
    if (!fips) {
      selCity.innerHTML = '<option value="">Select a city…</option>';
      return;
    }

    setStatus("Loading stations for this state…");

    try {
      var allStations = [];
      var offset = 1;
      var limit = 1000;

      while (true) {
        var data = await cdoFetch("/stations", {
          datasetid: DATASET,
          locationid: fips,
          datatypeid: "TMAX",
          limit: limit,
          offset: offset,
          sortfield: "name"
        });

        if (data.results && data.results.length > 0) {
          allStations = allStations.concat(data.results);
          var total = data.metadata && data.metadata.resultset ? data.metadata.resultset.count : 0;
          if (allStations.length >= total) break;
          offset += limit;
        } else {
          break;
        }
      }

      // Filter: must have data from 1970 or earlier AND within the last year
      var cutoffYear = String(new Date().getFullYear() - 1);
      allStations = allStations.filter(function(s) {
        var startsEarly = s.mindate && s.mindate.slice(0, 4) <= "1970";
        var endsRecent = s.maxdate && s.maxdate.slice(0, 4) >= cutoffYear;
        return startsEarly && endsRecent;
      });

      if (allStations.length === 0) {
        setStatus("No qualifying stations found in this state.", true);
        selCity.innerHTML = '<option value="">No cities found</option>';
        return;
      }

      // Parse city name from station name
      function parseCity(name) {
        return name
          .replace(/\s+\d[\d\.]*\s*(N|S|E|W|NE|NW|SE|SW|NNE|NNW|SSE|SSW|ENE|ESE|WNW|WSW)?\s*$/i, "")
          .replace(/\s*,.*$/, "")
          .replace(/\s+(AP|AIRPORT|ARPT|ASOS|AWOS|WSO|WFO|COOP|WBAN|AFB|AAF|NAS|MCAS|RGNL|MUNI|INTL|FAA).*$/i, "")
          .replace(/\s+\d+\s*$/, "")
          .trim()
          .replace(/\b\w/g, function(c) { return c.toUpperCase(); })
          .replace(/\b(Of|The|And|In|At|To|For)\b/g, function(w) { return w.toLowerCase(); });
      }

      // Group stations by city
      allStations.forEach(function(s) {
        var city = parseCity(s.name || "Unknown");
        if (!city) city = s.name || "Unknown";
        if (!stationsCache[city]) stationsCache[city] = [];
        stationsCache[city].push(s);
      });

      // Only show cities that match top 3 by population (partial match)
      var topList = (TOP_CITIES[currentFips] || []).map(function(c) { return c.toUpperCase(); });
      var cityNames = Object.keys(stationsCache).filter(function(city) {
        var cu = city.toUpperCase();
        return topList.some(function(top) {
          return cu.indexOf(top) !== -1 || top.indexOf(cu) !== -1;
        });
      });

      // Sort by population rank (match to closest top city)
      cityNames.sort(function(a, b) {
        var au = a.toUpperCase(), bu = b.toUpperCase();
        var aRank = topList.length, bRank = topList.length;
        topList.forEach(function(top, i) {
          if ((au.indexOf(top) !== -1 || top.indexOf(au) !== -1) && i < aRank) aRank = i;
          if ((bu.indexOf(top) !== -1 || top.indexOf(bu) !== -1) && i < bRank) bRank = i;
        });
        if (aRank !== bRank) return aRank - bRank;
        return a.localeCompare(b);
      });

      if (cityNames.length === 0) {
        setStatus("No qualifying stations found in the top cities for this state.", true);
        selCity.innerHTML = '<option value="">No cities found</option>';
        return;
      }

      selCity.innerHTML = '<option value="">Select a city… (' + cityNames.length + ')</option>';
      cityNames.forEach(function(city) {
        var opt = document.createElement("option");
        opt.value = city;
        opt.textContent = city;
        selCity.appendChild(opt);
      });

      selCity.disabled = false;
      setStatus(allStations.length + " stations across " + cityNames.length + " cities.");
    } catch (err) {
      setStatus("Error loading stations: " + err.message, true);
      selCity.innerHTML = '<option value="">Error</option>';
    }
  });

  // ━━━ CITY → POPULATE STATIONS FROM CACHE ━━━
  selCity.addEventListener("change", function() {
    selStation.innerHTML = '<option value="">Select a station…</option>';
    selStation.disabled = true;
    btnGen.disabled = true;
    elInfo.classList.remove("visible");
    elChart.classList.remove("visible");

    var city = this.value;
    if (!city || !stationsCache[city]) return;

    var stations = stationsCache[city];
    selStation.innerHTML = '<option value="">Select a station… (' + stations.length + ')</option>';
    stations.forEach(function(s) {
      var opt = document.createElement("option");
      opt.value = JSON.stringify(s);
      var dates = (s.mindate || "").slice(0, 4) + "–" + (s.maxdate || "").slice(0, 4);
      opt.textContent = s.name + " [" + dates + "]";
      selStation.appendChild(opt);
    });

    selStation.disabled = false;
    setStatus(stations.length + " station" + (stations.length > 1 ? "s" : "") + " in " + city + ".");
  });

  // ━━━ STATION → ENABLE BUTTON ━━━
  selStation.addEventListener("change", function() {
    btnGen.disabled = !this.value;
    elInfo.classList.remove("visible");
    elChart.classList.remove("visible");
  });

  // ━━━ GENERATE DATA ━━━
  btnGen.addEventListener("click", async function() {
    var stationJson = selStation.value;
    if (!stationJson) return;

    var station = JSON.parse(stationJson);
    btnGen.disabled = true;
    selState.disabled = true;
    selCity.disabled = true;
    selStation.disabled = true;

    document.getElementById("info-name").textContent = station.name;
    document.getElementById("info-id").textContent = station.id;
    document.getElementById("info-elev").textContent = station.elevation != null
      ? "Elev. " + station.elevation + " m" : "";
    document.getElementById("info-range").textContent = "Records: " + (station.mindate || "?") + " → " + (station.maxdate || "?");
    elInfo.classList.add("visible");
    elChart.classList.add("visible");

    try {
      setStatus("Fetching monthly temperature data…");
      showProgress(0);

      // Fetch TAVG (and TMAX as fallback) for all months
      // GSOM data endpoint: max 10-year range per request
      var currentYear = new Date().getFullYear();
      var chunks = [];
      for (var y = START_YEAR; y <= currentYear; y += 10) {
        var endY = Math.min(y + 9, currentYear);
        chunks.push({
          startdate: y + "-01-01",
          enddate: endY + "-12-31"
        });
      }

      var allResults = [];
      var apiCalls = 0;

      for (var i = 0; i < chunks.length; i++) {
        var chunk = chunks[i];
        var pct = Math.round((i / chunks.length) * 100);
        showProgress(pct);
        setStatus("Fetching " + chunk.startdate.slice(0, 4) + "–" + chunk.enddate.slice(0, 4) +
          "… (chunk " + (i + 1) + "/" + chunks.length + ")");

        var offset = 1;
        var limit = 1000;
        var chunkTotal = null;

        while (true) {
          var data = await cdoFetch("/data", {
            datasetid: DATASET,
            stationid: station.id,
            datatypeid: DATA_TYPES,
            startdate: chunk.startdate,
            enddate: chunk.enddate,
            units: "metric",
            limit: limit,
            offset: offset
          });
          apiCalls++;

          if (data.results && data.results.length > 0) {
            allResults = allResults.concat(data.results);
            if (chunkTotal === null && data.metadata && data.metadata.resultset) {
              chunkTotal = data.metadata.resultset.count;
            }
            var fetched = offset - 1 + data.results.length;
            if (chunkTotal && fetched >= chunkTotal) break;
            if (data.results.length < limit) break;
            offset += limit;
          } else {
            break;
          }
        }
      }

      showProgress(100);

      if (allResults.length === 0) {
        setStatus("No temperature data found for this station.", true);
        hideProgress();
        enableControls();
        return;
      }

      // Build a map keyed by date (YYYY-MM), preferring TAVG over TMAX
      var tempByMonth = {};
      var usedTavg = 0;
      var usedTmax = 0;

      allResults.forEach(function(r) {
        var dateKey = r.date.slice(0, 7); // YYYY-MM
        if (r.datatype === "TAVG") {
          tempByMonth[dateKey] = { x: r.date.slice(0, 10), y: r.value, type: "TAVG" };
        } else if (r.datatype === "TMAX") {
          // Only use TMAX if we don't already have TAVG for this month
          if (!tempByMonth[dateKey] || tempByMonth[dateKey].type !== "TAVG") {
            tempByMonth[dateKey] = { x: r.date.slice(0, 10), y: r.value, type: "TMAX" };
          }
        }
      });

      // Sort by date and build final array
      var sortedKeys = Object.keys(tempByMonth).sort();
      var temps = sortedKeys.map(function(k) {
        var entry = tempByMonth[k];
        if (entry.type === "TAVG") usedTavg++;
        else usedTmax++;
        return { x: entry.x, y: entry.y };
      });

      var sourceNote = "";
      if (usedTmax === 0) {
        sourceNote = "Using TAVG for all months.";
      } else if (usedTavg === 0) {
        sourceNote = "TAVG unavailable — using TMAX as fallback.";
      } else {
        sourceNote = "TAVG for " + usedTavg + " months, TMAX fallback for " + usedTmax + ".";
      }

      setStatus(
        temps.length + " monthly temperatures loaded. " + sourceNote +
        " (" + apiCalls + " API calls)"
      );
      hideProgress();

      renderChart(temps, station.name);

    } catch (err) {
      setStatus("Error fetching data: " + err.message, true);
      hideProgress();
    }

    enableControls();
  });

  function enableControls() {
    selState.disabled = false;
    selCity.disabled = false;
    selStation.disabled = false;
    btnGen.disabled = false;
  }

  // ━━━ LINEAR REGRESSION (least squares) ━━━
  function linearRegression(data) {
    // data = array of {x: "YYYY-MM-DD", y: number}
    // Convert dates to numeric (days since first date) for regression
    var firstTime = new Date(data[0].x).getTime();
    var n = data.length;
    var sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;

    var points = data.map(function(d) {
      var xNum = (new Date(d.x).getTime() - firstTime) / (1000 * 60 * 60 * 24); // days
      return { xNum: xNum, y: d.y, xDate: d.x };
    });

    points.forEach(function(p) {
      sumX += p.xNum;
      sumY += p.y;
      sumXY += p.xNum * p.y;
      sumX2 += p.xNum * p.xNum;
      sumY2 += p.y * p.y;
    });

    var slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
    var intercept = (sumY - slope * sumX) / n;

    // R² (coefficient of determination)
    var yMean = sumY / n;
    var ssRes = 0, ssTot = 0;
    points.forEach(function(p) {
      var predicted = slope * p.xNum + intercept;
      ssRes += (p.y - predicted) * (p.y - predicted);
      ssTot += (p.y - yMean) * (p.y - yMean);
    });
    var r2 = ssTot === 0 ? 0 : 1 - (ssRes / ssTot);

    // Slope per decade (days → decades: 3652.5 days per decade)
    var slopePerDecade = slope * 3652.5;

    // Generate trendline points (just start and end)
    var trendData = [
      { x: points[0].xDate, y: slope * points[0].xNum + intercept },
      { x: points[n - 1].xDate, y: slope * points[n - 1].xNum + intercept }
    ];

    // Mean of the trendline (average of start and end predicted values)
    var trendStart = slope * points[0].xNum + intercept;
    var trendEnd = slope * points[n - 1].xNum + intercept;
    var meanTrend = (trendStart + trendEnd) / 2;
    var totalChange = trendEnd - trendStart;

    return {
      trendData: trendData,
      slopePerDecade: slopePerDecade,
      r2: r2,
      meanTrend: meanTrend,
      totalChange: totalChange
    };
  }

  // ━━━ FIND LONGEST UNBROKEN STRETCH (gap threshold: 60 months / 5 years) ━━━
  function findLongestStretch(data) {
    if (data.length <= 1) return data;
    var GAP_THRESHOLD_DAYS = 5 * 365; // ~5 years in days
    var stretches = [];
    var currentStretch = [data[0]];

    for (var i = 1; i < data.length; i++) {
      var prevDate = new Date(data[i - 1].x).getTime();
      var currDate = new Date(data[i].x).getTime();
      var gapDays = (currDate - prevDate) / (1000 * 60 * 60 * 24);

      if (gapDays > GAP_THRESHOLD_DAYS) {
        stretches.push(currentStretch);
        currentStretch = [data[i]];
      } else {
        currentStretch.push(data[i]);
      }
    }
    stretches.push(currentStretch);

    // Return the longest stretch
    var longest = stretches[0];
    for (var j = 1; j < stretches.length; j++) {
      if (stretches[j].length > longest.length) {
        longest = stretches[j];
      }
    }
    return longest;
  }

  // ━━━ CHART ━━━
  function renderChart(temps, stationName) {
    elChart.classList.add("visible");
    if (chart) chart.destroy();

    // Find longest unbroken stretch for trendline
    var trendData = findLongestStretch(temps);

    // Compute trendline on longest stretch only
    var reg = linearRegression(trendData);
    var trendLabel = "Trend in temp since " + trendData[0].x.slice(0, 4) + ": " +
      (reg.totalChange >= 0 ? "+" : "") +
      reg.totalChange.toFixed(2) + " °C";

    // Update trend info display
    var trendEl = document.getElementById("trend-info");
    if (trendEl) {
      trendEl.textContent = trendLabel;
      trendEl.style.display = "block";
    }


    // Y-axis range: mean trend ± 30°C
    var yMin = Math.floor(reg.meanTrend - 30);
    var yMax = Math.ceil(reg.meanTrend + 30);

    var ctx = document.getElementById("tempChart").getContext("2d");

    // Insert null points where gaps > 45 days to break the line
    var tempsWithGaps = [];
    for (var gi = 0; gi < temps.length; gi++) {
      if (gi > 0) {
        var prevDate = new Date(temps[gi - 1].x).getTime();
        var currDate = new Date(temps[gi].x).getTime();
        var gapDays = (currDate - prevDate) / (1000 * 60 * 60 * 24);
        if (gapDays > 45) {
          tempsWithGaps.push({ x: temps[gi].x, y: null });
        }
      }
      tempsWithGaps.push(temps[gi]);
    }

    chart = new Chart(ctx, {
      type: "line",
      data: {
        datasets: [
          {
            label: "Avg Temperature (°C)",
            data: tempsWithGaps,
            borderColor: getComputedStyle(document.documentElement).getPropertyValue("--high").trim(),
            backgroundColor: "rgba(196, 93, 62, 0.08)",
            borderWidth: 1.5,
            pointRadius: 0,
            pointHitRadius: 0,
            spanGaps: false,
            fill: true,
            tension: 0.3,
            order: 2
          },
          {
            label: trendLabel,
            data: reg.trendData,
            borderColor: "#1b1e2a",
            borderWidth: 2,
            borderDash: [8, 4],
            pointRadius: 0,
            pointHitRadius: 0,
            fill: false,
            tension: 0,
            order: 1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        events: [],
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false }
        },
        scales: {
          x: {
            type: "time",
            time: {
              unit: "year",
              displayFormats: { year: "yyyy" },
              tooltipFormat: "MMM yyyy"
            },
            grid: { color: "rgba(0,0,0,0.04)", drawTicks: false },
            ticks: {
              font: { family: "'DM Mono', monospace", size: 11 },
              color: "#807a6e",
              padding: 8
            },
            border: { color: "#d2cdc3" }
          },
          y: {
            min: yMin,
            max: yMax,
            title: {
              display: true,
              text: "Temperature (°C)",
              font: { family: "'DM Mono', monospace", size: 11, weight: 400 },
              color: "#807a6e"
            },
            grid: { color: "rgba(0,0,0,0.04)", drawTicks: false },
            ticks: {
              font: { family: "'DM Mono', monospace", size: 11 },
              color: "#807a6e",
              padding: 8,
              callback: function(val) { return val + "°"; }
            },
            border: { color: "#d2cdc3" }
          }
        }
      }
    });

    elChart.scrollIntoView({ behavior: "smooth", block: "center" });
  }

})();
</script>
